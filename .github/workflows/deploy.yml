name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    env:
      DOCKER_HOST: unix:///Users/vankata/.docker/run/docker.sock

    steps:
      - uses: actions/checkout@v4

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/ivanpashkulev/web-main:${{ steps.sha.outputs.short }}
            ghcr.io/ivanpashkulev/web-main:latest

  open-deploy-pr:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ivanpashkulev/devops
          token: ${{ secrets.DEVOPS_PAT }}

      - name: Update image tag
        run: |
          sed -i "s|ghcr.io/ivanpashkulev/web-main:.*|ghcr.io/ivanpashkulev/web-main:${{ needs.build-and-push.outputs.sha }}|" docker-compose.yml

      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DEVOPS_PAT }}
          commit-message: "deploy: web-main → ${{ needs.build-and-push.outputs.sha }}"
          branch: deploy/web-main-${{ needs.build-and-push.outputs.sha }}
          title: "deploy: web-main → ${{ needs.build-and-push.outputs.sha }}"
          body: |
            Automated image tag update.

            **Repo:** ivanpashkulev/web-main
            **Commit:** ivanpashkulev/web-main@${{ github.sha }}
